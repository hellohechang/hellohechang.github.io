	<script>
		const oList = document.querySelector('#card ul');
		const list = [
			{
				title: 'hello',
				link: 'https://h.hellochang.eu.org',
				icon: 'iconfont icon-shoucang',
				blank: false
			},
			{
				title: 'Snapdrop',
				link: 'https://drop.hellochang.eu.org',
				icon: 'iconfont icon-xinxigongxiang',
				blank: true
			},
			{
				title: 'passwd',
				link: 'https://h.hellochang.eu.org/getpd',
				icon: 'iconfont icon-yuechi',
				blank: true
			},
			{
				title: 'cloud',
				link: 'https://alist.hellochang.eu.org',
				icon: 'iconfont icon-wangpan',
				blank: true
			},
			{
				title: 'memos',
				link: 'https://memos.hellochang.eu.org',
				icon: 'iconfont icon-yongyan',
				blank: true
			},
			{
				title: 'file',
				link: 'https://cloud.hellochang.eu.org',
				icon: 'iconfont icon-wenjianguanli',
				blank: true
			},
			{
				title: 'Vaultwd',
				link: 'https://pd.hellochang.eu.org',
				icon: 'iconfont icon-mima',
				blank: true
			},
			{
				title: 'Syncthing',
				link: 'https://sync.hellochang.eu.org',
				icon: 'iconfont icon-jurassic_tongbu_jieguo',
				blank: true
			},
			{
				title: 'CasaOS',
				link: 'https://casa.hellochang.eu.org',
				icon: 'iconfont icon-docker',
				blank: true
			},
			{
				title: 'xxx',
				link: 'https://x.hellochang.eu.org/chang',
				icon: 'iconfont icon-feiji',
				blank: true
			},
			{
				title: 'Email',
				link: 'mailto:hellohechang@gmail.com',
				icon: 'iconfont icon-email',
				blank: false
			},
		];
		let str = '';
		list.forEach((item, idx) => {
			const { title, icon } = item;
			str += `<li cursor data-idx="${idx}"><i class="${icon}"></i><span>${title}</span></li>`;
		})
		for (let i = 0; i < 10; i++) {
			str += `<li style="height: 0;margin: 0;padding:0;"></li>`;
		}
		oList.innerHTML = str;
		oList.addEventListener('click', function (e) {
			const target = _getTarget(e, 'li');
			if (target) {
				const idx = target.getAttribute('data-idx');
				let { link, blank } = list[idx];
				myOpen(link, blank)
			}
		})
		function myOpen(url, _blank) {
			if (!_blank && !url) return window.location.href;
			let a = document.createElement('a');
			a.href = url;
			_blank && (a.target = '_blank');
			document.body.appendChild(a);
			a.click();
			a.remove();
		}
		function _getTarget(e, targetStr, current) {
			let target = e.target,
				reg = new RegExp(`\\b${targetStr.replace(/^[\.#]/g, '')}\\b`, 'g');
			if (targetStr.startsWith('.')) {
				if (current) {
					if (reg.test(target.className)) {
						return target;
					} else {
						return null;
					}
				}
				while (target && !reg.test(target.className)) {
					target = target.parentNode;
				}
			} else if (targetStr.startsWith('#')) {
				if (current) {
					if (reg.test(target.id)) {
						return target;
					} else {
						return null;
					}
				}
				while (target && !reg.test(target.id)) {
					target = target.parentNode;
				}
			} else {
				if (current) {
					if (targetStr.toUpperCase() === target.tagName) {
						return target;
					} else {
						return null;
					}
				}
				while (target && targetStr.toUpperCase() !== target.tagName) {
					target = target.parentNode;
				}
			}
			return target;
		}

	</script>
